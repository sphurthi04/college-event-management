<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatbot - Student</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .quick-btns { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 16px; background: white; border-top: 1px solid var(--border); }
    .quick-btn { padding: 6px 14px; border: 1px solid var(--primary); color: var(--primary); border-radius: 20px; cursor: pointer; font-size: 13px; background: white; transition: var(--transition); }
    .quick-btn:hover { background: var(--primary); color: white; }
    .typing { display: flex; gap: 4px; align-items: center; padding: 12px 16px; }
    .typing span { width: 8px; height: 8px; background: var(--gray); border-radius: 50%; animation: bounce 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-8px)} }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar" id="topbar"></header>
    <main class="page-content">
      <div class="card" style="max-width:800px;margin:0 auto">
        <div class="card-header">
          <div style="display:flex;align-items:center;gap:12px">
            <div style="width:40px;height:40px;background:#4F46E5;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px">🤖</div>
            <div>
              <div class="card-title">Event Assistant</div>
              <div style="font-size:12px;color:#10B981">● Online</div>
            </div>
          </div>
        </div>

        <div class="chatbot-container" style="height:450px">
          <div class="chatbot-messages" id="chat-messages">
            <div class="chat-message bot">
              👋 Hello! I'm your College Event Management Assistant. I can help you with:<br><br>
              • Event registrations<br>
              • Certificate information<br>
              • Venue details<br>
              • Attendance queries<br><br>
              What would you like to know?
            </div>
          </div>
          <div class="quick-btns">
            <button class="quick-btn" onclick="sendQuick('How do I register for an event?')">📝 Register for event</button>
            <button class="quick-btn" onclick="sendQuick('How do I get my certificate?')">🏅 Get certificate</button>
            <button class="quick-btn" onclick="sendQuick('What are the upcoming events?')">📅 Upcoming events</button>
            <button class="quick-btn" onclick="sendQuick('How is attendance marked?')">✅ Attendance</button>
            <button class="quick-btn" onclick="sendQuick('How do I cancel my registration?')">❌ Cancel registration</button>
          </div>
          <div class="chatbot-input">
            <input type="text" id="chat-input" class="form-control" placeholder="Type your question..." onkeypress="handleKeyPress(event)">
            <button class="btn btn-primary" onclick="sendMessage()">Send ➤</button>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
  const user = requireAuth(['student']);
  if (user) {
    document.getElementById('sidebar').innerHTML = renderSidebar('student', 'student-chatbot');
    document.getElementById('topbar').innerHTML = renderTopbar('Event Chatbot');
  }

  function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(); }
  function sendQuick(msg) { document.getElementById('chat-input').value = msg; sendMessage(); }

  async function sendMessage() {
    const input = document.getElementById('chat-input');
    const message = input.value.trim();
    if (!message) return;

    appendMessage(message, 'user');
    input.value = '';
    showTyping();

    try {
      const data = await api('POST', '/chatbot/message', { message });
      hideTyping();
      appendMessage(data.reply, 'bot');
    } catch (err) {
      hideTyping();
      appendMessage('Sorry, I encountered an error. Please try again.', 'bot');
    }
  }

  function appendMessage(text, type) {
    const container = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = `chat-message ${type}`;
    div.innerHTML = text.replace(/\n/g, '<br>');
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function showTyping() {
    const container = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.id = 'typing-indicator';
    div.className = 'chat-message bot typing';
    div.innerHTML = '<span></span><span></span><span></span>';
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }
</script>
</body>
</html>
