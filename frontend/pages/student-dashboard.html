<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar" id="topbar"></header>
    <main class="page-content">
      <div id="alert-box"></div>

      <!-- Welcome Banner -->
      <div style="background:linear-gradient(135deg,#10B981,#059669);border-radius:12px;padding:28px;color:white;margin-bottom:28px">
        <h2 id="welcome-msg">Welcome!</h2>
        <p style="opacity:0.85;margin-top:4px">Discover and register for exciting college events</p>
      </div>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-icon blue">📅</div><div class="stat-info"><div class="stat-value" id="stat-available">-</div><div class="stat-label">Available Events</div></div></div>
        <div class="stat-card"><div class="stat-icon green">📋</div><div class="stat-info"><div class="stat-value" id="stat-registered">-</div><div class="stat-label">My Registrations</div></div></div>
        <div class="stat-card"><div class="stat-icon purple">🏅</div><div class="stat-info"><div class="stat-value" id="stat-certs">-</div><div class="stat-label">Certificates</div></div></div>
      </div>

      <!-- Featured Events -->
      <div class="card">
        <div class="card-header">
          <h3 class="card-title">🔥 Upcoming Events</h3>
          <a href="student-events.html" class="btn btn-primary btn-sm">View All</a>
        </div>
        <div class="card-body">
          <div id="featured-events" class="events-grid"></div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
  const user = requireAuth(['student']);
  if (user) {
    document.getElementById('sidebar').innerHTML = renderSidebar('student', 'student-dashboard');
    document.getElementById('topbar').innerHTML = renderTopbar('Student Dashboard');
    document.getElementById('welcome-msg').textContent = `Welcome, ${user.name}! 👋`;
    loadDashboard();
  }

  async function loadDashboard() {
    try {
      const [eventsData, myRegsData, certsData] = await Promise.all([
        api('GET', '/events/all'),
        api('GET', '/registrations/my'),
        api('GET', '/certificates/my')
      ]);

      document.getElementById('stat-available').textContent = eventsData.data.length;
      document.getElementById('stat-registered').textContent = myRegsData.data.length;
      document.getElementById('stat-certs').textContent = certsData.data.length;

      const myEventIds = new Set(myRegsData.data.map(r => r.event?._id));
      const featured = eventsData.data.slice(0, 6);

      document.getElementById('featured-events').innerHTML = featured.length
        ? featured.map(e => `
          <div class="event-card">
            <div class="event-card-banner">${categoryEmoji[e.category] || '📌'}</div>
            <div class="event-card-body">
              <span class="event-card-category">${e.category}</span>
              <div class="event-card-title">${e.title}</div>
              <div class="event-card-meta">
                <span>📅 ${formatDate(e.date)}</span>
                <span>⏰ ${e.startTime} - ${e.endTime}</span>
                <span>🏛️ ${e.venue?.name || '-'}</span>
                <span>👥 ${e.registeredCount}/${e.maxParticipants} registered</span>
              </div>
            </div>
            <div class="event-card-footer">
              ${myEventIds.has(e._id) ? '<span class="badge badge-success">✅ Registered</span>' : statusBadge(e.status)}
              <a href="student-events.html" class="btn btn-sm btn-primary">View</a>
            </div>
          </div>`).join('')
        : '<div class="empty-state"><div class="empty-icon">📅</div><h3>No events available</h3></div>';
    } catch (err) { showAlert('alert-box', err.message, 'error'); }
  }
</script>
</body>
</html>
