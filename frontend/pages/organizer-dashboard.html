<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organizer Dashboard</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar" id="topbar"></header>
    <main class="page-content">
      <div id="alert-box"></div>

      <!-- Welcome Banner -->
      <div style="background:linear-gradient(135deg,#4F46E5,#7C3AED);border-radius:12px;padding:28px;color:white;margin-bottom:28px">
        <h2 id="welcome-msg">Welcome back!</h2>
        <p id="welcome-sub" style="opacity:0.85;margin-top:4px">Manage your events and club activities</p>
      </div>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-icon blue">📅</div><div class="stat-info"><div class="stat-value" id="stat-events">-</div><div class="stat-label">My Events</div></div></div>
        <div class="stat-card"><div class="stat-icon green">📋</div><div class="stat-info"><div class="stat-value" id="stat-regs">-</div><div class="stat-label">Total Registrations</div></div></div>
        <div class="stat-card"><div class="stat-icon purple">✉️</div><div class="stat-info"><div class="stat-value" id="stat-invites">-</div><div class="stat-label">Invitations Sent</div></div></div>
        <div class="stat-card"><div class="stat-icon orange">🏅</div><div class="stat-info"><div class="stat-value" id="stat-certs">-</div><div class="stat-label">Certificates Issued</div></div></div>
      </div>

      <!-- Upcoming Events -->
      <div class="card">
        <div class="card-header">
          <h3 class="card-title">📅 My Upcoming Events</h3>
          <a href="organizer-events.html" class="btn btn-primary btn-sm">+ Create Event</a>
        </div>
        <div class="card-body">
          <div id="upcoming-events" class="events-grid"></div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
  const user = requireAuth(['organizer']);
  if (user) {
    document.getElementById('sidebar').innerHTML = renderSidebar('organizer', 'organizer-dashboard');
    document.getElementById('topbar').innerHTML = renderTopbar('Organizer Dashboard');
    document.getElementById('welcome-msg').textContent = `Welcome back, ${user.name}! 👋`;
    document.getElementById('welcome-sub').textContent = `${user.clubName} | ${user.collegeName}`;
    loadDashboard();
  }

  async function loadDashboard() {
    try {
      const [eventsData, invData] = await Promise.all([
        api('GET', '/events'),
        api('GET', '/invitations')
      ]);

      const events = eventsData.data;
      document.getElementById('stat-events').textContent = events.length;
      document.getElementById('stat-invites').textContent = invData.data.length;

      const totalRegs = events.reduce((sum, e) => sum + (e.registeredCount || 0), 0);
      document.getElementById('stat-regs').textContent = totalRegs;
      document.getElementById('stat-certs').textContent = '-';

      const upcoming = events.filter(e => e.status === 'upcoming').slice(0, 6);
      document.getElementById('upcoming-events').innerHTML = upcoming.length
        ? upcoming.map(e => `
          <div class="event-card">
            <div class="event-card-banner">${categoryEmoji[e.category] || '📌'}</div>
            <div class="event-card-body">
              <span class="event-card-category">${e.category}</span>
              <div class="event-card-title">${e.title}</div>
              <div class="event-card-meta">
                <span>📅 ${formatDate(e.date)}</span>
                <span>⏰ ${e.startTime} - ${e.endTime}</span>
                <span>🏛️ ${e.venue?.name || '-'}</span>
                <span>👥 ${e.registeredCount}/${e.maxParticipants} registered</span>
              </div>
            </div>
            <div class="event-card-footer">
              ${statusBadge(e.status)}
              <a href="organizer-registrations.html?event=${e._id}" class="btn btn-sm btn-secondary">View Registrations</a>
            </div>
          </div>`).join('')
        : '<div class="empty-state"><div class="empty-icon">📅</div><h3>No upcoming events</h3><p>Create your first event to get started</p></div>';
    } catch (err) { showAlert('alert-box', err.message, 'error'); }
  }
</script>
</body>
</html>
