<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitations - Admin</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar" id="topbar"></header>
    <main class="page-content">
      <div id="alert-box"></div>
      <div class="card">
        <div class="card-header"><h3 class="card-title">✉️ Inter-College Invitations</h3></div>
        <div class="card-body">
          <div class="table-wrapper">
            <table>
              <thead><tr><th>Event</th><th>From College</th><th>To College</th><th>To Email</th><th>Sent By</th><th>Status</th><th>Sent At</th><th>Actions</th></tr></thead>
              <tbody id="invitations-table"><tr><td colspan="8" class="text-center"><div class="spinner"></div></td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
<script src="../js/api.js"></script>
<script>
  const user = requireAuth(['admin']);
  if (user) {
    document.getElementById('sidebar').innerHTML = renderSidebar('admin', 'admin-invitations');
    document.getElementById('topbar').innerHTML = renderTopbar('Inter-College Invitations');
    loadInvitations();
  }
  async function loadInvitations() {
    try {
      const data = await api('GET', '/invitations');
      document.getElementById('invitations-table').innerHTML = data.data.length
        ? data.data.map(inv => `
          <tr>
            <td><b>${inv.event?.title || '-'}</b></td>
            <td>${inv.fromCollege}</td>
            <td>${inv.toCollege}</td>
            <td>${inv.toEmail}</td>
            <td>${inv.sentBy?.name || '-'}</td>
            <td>${statusBadge(inv.status)}</td>
            <td>${formatDate(inv.sentAt)}</td>
            <td>
              ${inv.status === 'sent' ? `
                <button class="btn btn-sm btn-success" onclick="updateStatus('${inv._id}','accepted')">✅ Accept</button>
                <button class="btn btn-sm btn-danger" onclick="updateStatus('${inv._id}','declined')">❌ Decline</button>
              ` : '-'}
            </td>
          </tr>`).join('')
        : '<tr><td colspan="8" class="text-center text-muted">No invitations found</td></tr>';
    } catch (err) { showAlert('alert-box', err.message, 'error'); }
  }
  async function updateStatus(id, status) {
    try {
      await api('PUT', `/invitations/${id}/status`, { status });
      showAlert('alert-box', `Invitation ${status}!`, 'success');
      loadInvitations();
    } catch (err) { showAlert('alert-box', err.message, 'error'); }
  }
</script>
</body>
</html>
